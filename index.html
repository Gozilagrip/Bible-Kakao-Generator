<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성경 통독 생성기</title>

<style>
body{
font-family:Arial;
max-width:700px;
margin:40px auto;
line-height:1.6;
padding:10px;
}

input,button{
font-size:16px;
padding:10px;
}

textarea{
width:100%;
height:300px;
margin-top:10px;
font-size:14px;
}

button{
margin-top:10px;
}
</style>
</head>

<body>

<h2>성경 통독 카톡 생성기</h2>

<input id="input" style="width:70%" placeholder="예: 창세기 46-50">

<button onclick="generate()">생성</button>
<button onclick="copy()">복사</button>

<textarea id="output"></textarea>

<script>

const books={
"창세기":1,"출애굽기":2,"레위기":3,"민수기":4,"신명기":5,
"여호수아":6,"사사기":7,"룻기":8,"사무엘상":9,"사무엘하":10,
"열왕기상":11,"열왕기하":12,"역대상":13,"역대하":14,"에스라":15,
"느헤미야":16,"에스더":17,"욥기":18,"시편":19,"잠언":20,
"전도서":21,"아가":22,"이사야":23,"예레미야":24,"예레미야애가":25,
"에스겔":26,"다니엘":27,"호세아":28,"요엘":29,"아모스":30,
"오바댜":31,"요나":32,"미가":33,"나훔":34,"하박국":35,
"스바냐":36,"학개":37,"스가랴":38,"말라기":39,
"마태복음":40,"마가복음":41,"누가복음":42,"요한복음":43,
"사도행전":44,"로마서":45,"고린도전서":46,"고린도후서":47,
"갈라디아서":48,"에베소서":49,"빌립보서":50,"골로새서":51,
"데살로니가전서":52,"데살로니가후서":53,"디모데전서":54,"디모데후서":55,
"디도서":56,"빌레몬서":57,"히브리서":58,"야고보서":59,"베드로전서":60,
"베드로후서":61,"요한일서":62,"요한이서":63,"요한삼서":64,"유다서":65,"요한계시록":66
};

function generate(){

let text=document.getElementById("input").value.trim()

let parts=text.split(" ")
let book=parts[0]
let range=parts[1].split("-")

let start=parseInt(range[0])
let end=parseInt(range[1])

let num=books[book]

let msg="샬롬~^^\n"
msg+="오늘도 말씀의 은혜가\n"
msg+="충만하게 임하시길 기원합니다.\n\n"

msg+="오늘은\n"
msg+=book+" "+start+"~"+end+"장입니다.\n\n"

for(let i=start;i<=end;i++){

let code=num*1000+i

msg+=i+"장 - https://cnts.godpeople.com/words/"+code+"\n"

}

document.getElementById("output").value=msg

}

function copy(){

let text=document.getElementById("output")

text.select()

document.execCommand("copy")

alert("복사되었습니다")

}

</script>

</body>
</html>
